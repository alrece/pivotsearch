name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 安装 Linux Tauri 系统依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      # 编译 psearch CLI sidecar（必须在 Tauri build 前完成）
      - name: 编译 psearch CLI (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cargo build --release -p psearch
          mkdir -p src-tauri/binaries
          TARGET="${{ matrix.target }}"
          EXT=""
          cp "target/release/psearch" "src-tauri/binaries/psearch-${TARGET}${EXT}"
          chmod +x "src-tauri/binaries/psearch-${TARGET}${EXT}"
          echo "✅ sidecar: src-tauri/binaries/psearch-${TARGET}${EXT}"

      - name: 编译 psearch CLI (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo build --release -p psearch
          mkdir -p src-tauri/binaries
          TARGET="${{ matrix.target }}"
          cp "target/release/psearch.exe" "src-tauri/binaries/psearch-${TARGET}.exe"
          echo "✅ sidecar: src-tauri/binaries/psearch-${TARGET}.exe"

      - name: 构建桌面应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "pivotsearch ${{ github.ref_name }}"
          releaseBody: "跨平台本地全文搜索桌面应用 · 含 psearch CLI"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
