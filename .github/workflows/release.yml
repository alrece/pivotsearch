name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 安装 Linux Tauri 系统依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      # 编译 psearch CLI sidecar（跨平台 node 脚本）
      - name: 编译 psearch sidecar
        run: node scripts/prepare-sidecar.mjs

      # 构建桌面应用（beforeBundleCommand 会再次确保 sidecar 就位）
      - name: 构建桌面应用
        run: pnpm tauri build --target ${{ matrix.target }}

      # macOS: ad-hoc 签名（解决未签名 app 被 Gatekeeper 拦截）
      - name: macOS ad-hoc 签名
        if: matrix.os == 'macos-latest'
        run: |
          APP_PATH=$(find src-tauri/target/*/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          echo "签名: $APP_PATH"
          codesign --force --deep --options runtime --sign - "$APP_PATH"
          # 验证签名
          codesign --verify --verbose=2 "$APP_PATH" || true

      # 上传产物
      - name: 上传 macOS 产物
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pivotsearch-macos-arm64
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg

      - name: 上传 Linux 产物
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pivotsearch-linux
          path: |
            src-tauri/target/*/release/bundle/deb/*.deb
            src-tauri/target/*/release/bundle/appimage/*.AppImage

      - name: 上传 Windows 产物
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pivotsearch-windows
          path: |
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/nsis/*.exe

  # 创建 GitHub Release（仅 tag push 触发）
  release:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "pivotsearch ${{ github.ref_name }}"
          body: |
            跨平台本地全文搜索桌面应用 · 含 psearch CLI

            ## 安装说明

            ### macOS
            下载 `.dmg` 文件后：
            1. 打开 DMG，拖动 PivotSearch 到「应用程序」文件夹
            2. 首次打开如果提示"无法验证开发者"，右键点击 app → 选择「打开」→ 确认
            3. 如果仍被阻止，在终端运行：
               ```
               sudo xattr -rd com.apple.quarantine /Applications/pivotsearch.app
               ```

            ### Linux
            下载 `.deb` 安装：`sudo dpkg -i pivotsearch_*.deb`
            或下载 `.AppImage` 直接运行：`chmod +x pivotsearch*.AppImage && ./pivotsearch*.AppImage`

            ### Windows
            下载 `.msi` 或 `.exe` 安装程序，双击运行。

            ## psearch CLI
            安装 app 后，打开「索引管理」→ 点击「安装命令行工具」即可在终端使用 `psearch` 命令。
          draft: false
          prerelease: false
          files: artifacts/**
