name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 安装 Linux Tauri 系统依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      # 编译 psearch CLI sidecar
      - name: 编译 psearch sidecar (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cargo build --release -p psearch
          mkdir -p src-tauri/binaries
          TARGET="${{ matrix.target }}"
          cp "target/release/psearch" "src-tauri/binaries/psearch-${TARGET}"
          chmod +x "src-tauri/binaries/psearch-${TARGET}"

      - name: 编译 psearch sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo build --release -p psearch
          mkdir -p src-tauri/binaries
          TARGET="${{ matrix.target }}"
          cp "target/release/psearch.exe" "src-tauri/binaries/psearch-${TARGET}.exe"

      # 直接用 pnpm tauri build（用本地 lockfile 版本，避免 mismatch）
      - name: 构建桌面应用
        run: pnpm tauri build --target ${{ matrix.target }}

      # 上传产物
      - name: 上传 macOS 产物
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pivotsearch-macos-arm64
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/*.app

      - name: 上传 Linux 产物
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pivotsearch-linux
          path: |
            src-tauri/target/*/release/bundle/deb/*.deb
            src-tauri/target/*/release/bundle/appimage/*.AppImage

      - name: 上传 Windows 产物
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pivotsearch-windows
          path: |
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/nsis/*.exe

  # 创建 GitHub Release（所有产物上传后）
  release:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "pivotsearch ${{ github.ref_name }}"
          body: "跨平台本地全文搜索桌面应用 · 含 psearch CLI"
          draft: false
          prerelease: false
          files: artifacts/**
