# ═══════════════════════════════════════════════════════════════
# Iteration 1 / Phase 1 — 核心索引闭环（T1-T3）
# ═══════════════════════════════════════════════════════════════
- iteration: 1
  date: 2026-07-02T14:15:00Z
  milestone: "Phase 1 核心索引闭环跑通——CLI 能索引目录并中文/英文检索，16 测试全过，对抗门 4 项通过"
  decisions:
    - "Tantivy 0.24 API 适配：schema 用 TextOptions + TextFieldIndexing builder（不是旧的 STRING/TEXT 常量组合），Document 用 TantivyDocument(=CompactDoc)（Document 是 trait）"
    - "jieba Tokenizer 用 Arc<Jieba> 实现 Clone（tantivy Tokenizer trait 要求 Clone），HMM 模式提升未登录词召回"
    - "pdfium-render 动态链接模式（运行时缺 PDFium 库返回清晰错误），静态链接留到 Phase 5"
    - "chardetng API：EncodingDetector::new(Iso2022JpDetection::Allow) + guess(tld, Utf8Detection::Allow)，枚举是 Allow/Deny 不是 Enabled/Disabled"
    - "docx-rs 文本提取递归遍历 Document→Paragraph→Run→Text，Hyperlink.children 是 Vec<ParagraphChild> 需递归"
    - "USTC cargo mirror 解决 static.crates.io DNS 解析失败（环境网络问题），写入 ~/.cargo/config.toml 持久生效"
  lessons:
    - { kind: keep,   text: "T1-T3 渐进式推进有效：先 schema(7测试) → 再 parser(9测试) → 最后 cli 端到端验证，每步可独立验证", source: "retro" }
    - { kind: keep,   text: "中文检索闭环验证成功：搜「营收」命中季度报告.txt、搜「内存」命中 rust-guide.md，jieba 分词 + Tantivy 全链路跑通", source: "retro" }
    - { kind: keep,   text: "PDF/docx/xlsx/html/md/txt 六格式解析器全部实现，注册表两级选择（mime 优先/扩展名 fallback）工作正常", source: "retro" }
    - { kind: keep,   text: "GBK 编码文本解码验证通过（'中文' 正确识别），chardetng+encoding_rs 方案可靠", source: "retro" }
    - { kind: keep,   text: "对抗门 4 项全过：编译/16测试/净室grep/依赖方向，gate 级质量守护有效", source: "retro" }
    - { kind: improve, text: "Tantivy 0.24 API 与旧版本差异大（TEXT变TextOptions、Document变trait、Tokenizer要求Clone），首次基于记忆写的代码有 10+ 编译错误——应先查实际 API 文档再写", source: "retro" }
    - { kind: improve, text: "snippet 片段为空：SnippetGenerator 用 title 做 snippet 但 query 命中 content（title 里没有查询词）。Phase 4 预览功能应从原文件重新解析重建 snippet", source: "retro" }
    - { kind: improve, text: "cli 索引时未过滤 lock 文件和隐藏文件（首次测试误索引了 Tantivy 自身 lock），已修复但应在 Indexer trait 层固化排除规则", source: "retro" }
    - { kind: improve, text: "代码注释里写了 DocFetcher 名字触发净室 grep——注释应避免提及具体参考项目名，改用中性表述", source: "retro" }
    - { kind: try,    text: "Phase 2 增量索引：实现 mtime 比对 + unseenDocs diff + SQLite tree_index，让文件修改后自动更新", source: "retro" }
    - { kind: try,    text: "Phase 2 文件监听：notify + 防抖，让 CLI watch 命令能实时响应文件变化", source: "retro" }
    - { kind: try,    text: "补充真实 PDF/docx/xlsx 测试文件（当前只有格式扩展名验证，缺真实文件解析测试）", source: "retro" }
  patterns:
    - "Tantivy 0.24 API 适配清单：TextOptions+TextFieldIndexing / TantivyDocument(CompactDoc) / Tokenizer 要求 Clone / Value trait 的 as_str 在 scope / SnippetGenerator::snippet(&text)"
    - "USTC mirror 解决 crates.io DNS：~/.cargo/config.toml 配 [source.ustc] registry='sparse+https://mirrors.ustc.edu.cn/crates.io-index/'"
    - "API 查证驱动开发：遇到编译错误先查 crate 源码（~/.cargo/registry/src/）确认真实签名，不靠记忆"
    - "渐进式 plan 执行：T1→T2→T3 每 plan 完成跑子测试，全过再跑 Phase 级对抗门"

# ═══════════════════════════════════════════════════════════════
# Iteration 1 / Phase 2 — 增量索引 + 文件监听 + 任务队列
# ═══════════════════════════════════════════════════════════════
- iteration: 1
  date: 2026-07-02T15:00:00Z
  milestone: "Phase 2 增量与监听完成——pivotsearch 从全量重建进化到'改动即更新'，31 测试全过"
  decisions:
    - "tree_index 用 SQLite（rusqlite）持久化，替代经典桌面搜索工具的 Java 序列化——跨版本稳定、可查询"
    - "增量算法用 HashMap unseen diff（克隆→遍历 remove→剩余即删除），mtime 比对判定修改"
    - "解析失败/不支持的文件仍记录到 tree_index（parser=null）避免重复重试坏文件"
    - "watcher 用 notify-debouncer-full 做 1s 防抖（编辑器保存触发 N 次事件只发 1 个），事件过滤跳过 lock/隐藏文件"
    - "queue 单工作线程串行执行（Tantivy 单 writer 强约束），通过 TaskHandler trait 解耦不依赖 index crate"
    - "queue 去重：同 index_id 的冗余 Update 任务丢弃，Rebuild 不去重"
  lessons:
    - { kind: keep,   text: "增量算法三类变化全部验证：新增(+N)/修改(~N)/删除(-N) + 未变跳过，unseen diff 模式工作正常", source: "retro" }
    - { kind: keep,   text: "SQLite tree_index CRUD + 级联删除验证通过，持久化状态可靠", source: "retro" }
    - { kind: keep,   text: "文件监听端到端验证：创建文件后收到事件、lock 文件被过滤、防抖窗口 1s 合并事件", source: "retro" }
    - { kind: keep,   text: "queue 通过 TaskHandler trait 解耦——queue crate 不依赖 index crate，符合依赖方向铁律", source: "retro" }
    - { kind: keep,   text: "queue 去重验证：同 index_id 的 5 个 Update 任务只执行 1 次", source: "retro" }
    - { kind: improve, text: "IndexId/Uid 类型别名(&String)与 &str 不兼容导致 18 个编译错误——类型别名的方法签名应直接用 &str 更通用", source: "retro" }
    - { kind: improve, text: "notify 6.1 的 watch 方法在 Watcher trait 上需要 import，且 RecommendedWatcher 平台相关（macOS=FsEventWatcher）——需 use notify::Watcher 引入 trait", source: "retro" }
    - { kind: improve, text: "queue 测试偶现时序竞态（500ms 等待不够稳定）——生产代码应用 condvar/channel 而非 sleep 等待", source: "retro" }
    - { kind: try,    text: "Phase 3 补全解析格式（pptx/epub/归档穿透）+ 多索引合并搜索", source: "retro" }
    - { kind: try,    text: "Phase 3 补真实 PDF/docx/xlsx 测试文件（当前只有 txt）", source: "retro" }
    - { kind: try,    text: "Phase 3 修复 snippet 高亮从 content 重建（当前用 title 导致片段为空）", source: "retro" }
  patterns:
    - "unseen diff 增量算法：HashMap 克隆→遍历 remove→剩余即删除，三类变化一次遍历处理"
    - "类型别名 &String 参数应改 &str：pub type X=String 后 fn f(&X) 不接受 &str，改 fn f(&str) 更通用"
    - "notify-debouncer-full 防抖：1s 窗口 + 事件过滤，watch_with_callback 模式把过滤后事件发 callback"
    - "queue TaskHandler trait 解耦：queue 不依赖 index，由组装根注入闭包/实现"

# ═══════════════════════════════════════════════════════════════
# Iteration 1 / Phase 3 — 解析补全 + 多索引合并
# ═══════════════════════════════════════════════════════════════
- iteration: 1
  date: 2026-07-02T15:45:00Z
  milestone: "Phase 3 全格式补全 + 多索引合并——epub/pptx/归档穿透就绪，33 测试全过"
  decisions:
    - "epub/pptx 用 zip+XML 手动实现而非依赖重型 crate（epub crate 没下载成功，ooxmlsdk 要求 rust 1.88），更轻量可控"
    - "pptx 提取 slide XML 的 <a:t> 标签文本（OOXML 文本运行），按 slide 序号排序"
    - "归档穿透用 tempfile 解包到临时目录后递归调用 registry.parse，合并所有内部文件文本"
    - "is_archive 用文件名后缀检测（处理双扩展名 .tar.gz），而非 Path::extension（只返回最后一段）"
    - "strip_html_tags 用 remove_blocks 先去 script/style 块再去标签（首次实现状态机逻辑有 bug，改用显式块移除）"
    - "MultiIndexSearcher 持有 Vec<(index_id, SimpleSearcher)>，每索引独立查询 top-N 合并，单索引损坏跳过不致命"
  lessons:
    - { kind: keep,   text: "归档穿透端到端验证通过：zip 内部 inner.txt 内容被索引并搜索命中", source: "retro" }
    - { kind: keep,   text: "多格式端到端验证：txt/md/html/json/zip 全部正确解析和检索", source: "retro" }
    - { kind: keep,   text: "epub/pptx 用 zip+XML 手动实现，避免重型 crate 依赖，减少编译时间和版本耦合", source: "retro" }
    - { kind: improve, text: "strip_html_tags 首次用 in_tag/in_script 状态机逻辑有 bug（script 内容泄漏），改用 remove_blocks 显式块移除更可靠", source: "retro" }
    - { kind: improve, text: "Path::extension 对 .tar.gz 只返回 gz，双扩展名需用 file_name() ends_with 检测", source: "retro" }
    - { kind: improve, text: "tempfile 必须是正式依赖而非 dev-dependency（归档穿透运行时需要临时目录）", source: "retro" }
    - { kind: try,    text: "Phase 4 OCR 管道（kreuzberg-tesseract feature gate）+ Tauri 桌面 UI", source: "retro" }
    - { kind: try,    text: "Phase 4 修复 snippet 高亮从 content 重建（当前用 title 导致片段为空）", source: "retro" }
  patterns:
    - "OOXML 解析通用法：zip 解包 → 提取固定路径 XML（slide/docProps/core）→ 解析特定标签（<a:t>/<dc:title>）"
    - "双扩展名检测：用 file_name().ends_with('.tar.gz') 而非 extension()（只返回最后一段）"
    - "HTML 文本提取：remove_blocks(去script/style) + 扫标签，比状态机更不易错"
    - "多索引合并：Vec<(id, Searcher)> 各查 top-N 合并，单索引失败跳过不致命"

# ═══════════════════════════════════════════════════════════════
# Iteration 1 / Phase 4 — Tauri 桌面 UI + OCR 骨架
# ═══════════════════════════════════════════════════════════════
- iteration: 1
  date: 2026-07-02T18:50:00Z
  milestone: "Phase 4 Tauri 桌面应用骨架——Vue 3 前端 + #[tauri::command] 桥接真实引擎，前后端编译通过"
  decisions:
    - "src-tauri 作为独立 Cargo 项目（exclude 在 workspace 外），避免 Tauri 的 build 依赖污染主 workspace"
    - "Tauri 命令桥接：add_index 后台线程索引 + 进度 emit；search/list_indexes/remove/rebuild 从 state.index_dirs 重新 open Tantivy Index 查询"
    - "search 命令用 MultiIndexSearcher 合并多个索引根结果，单索引损坏跳过不致命"
    - "OCR feature gate 骨架：默认 ocr_available()=false，--features ocr 时占位（kreuzberg-tesseract 集成待语言包方案落地）"
    - "icon 用 Python 生成占位 PNG（纯色 #3B5BDB），tauri icon 命令生成全套平台 icon"
    - "filters 解构避免 Option.and_then 多次消费（E0382 moved value）"
  lessons:
    - { kind: keep,   text: "Tauri 2 + Vue 3 + Element Plus 前端栈工作正常，pnpm build 产出 dist/，src-tauri 编译通过", source: "retro" }
    - { kind: keep,   text: "命令桥接完整：add_index/search/list_indexes/remove/rebuild 五个命令全部接真实 TreeIndex + Tantivy Index", source: "retro" }
    - { kind: keep,   text: "search 用 MultiIndexSearcher 从 state.index_dirs 重新 open 查询，单索引失败跳过不致命", source: "retro" }
    - { kind: improve, text: "fields/index 在后台线程 move 后外部不能再用——把 searcher 注册改为 search 时重新 open（add_index 不注册 searcher）", source: "retro" }
    - { kind: improve, text: "Tauri 2 的 app.emit 需要 use tauri::Emitter，不像 1.x 直接可用", source: "retro" }
    - { kind: improve, text: "Option.and_then 会消费 self，连续调用同一 Option 报 moved value——先解构再赋值", source: "retro" }
    - { kind: try,    text: "Phase 5 Tauri dev/build 实际运行验证（需要 GUI 环境）+ PDFium/Tesseract 原生库三端打包", source: "retro" }
    - { kind: try,    text: "Phase 5 补预览面板（get_preview 重新解析原文件）+ snippet 从 content 重建", source: "retro" }
  patterns:
    - "Tauri 项目结构：src-tauri 独立 Cargo 项目（workspace exclude），tauri.conf.json 配 frontendDist/devUrl"
    - "命令桥接模式：#[tauri::command] + State<Arc<Mutex<EngineState>>> 共享，后台线程 std::thread::spawn + app.emit 进度"
    - "search 重新 open 模式：命令从 state.index_dirs 读路径，每次 open Tantivy Index + SimpleSearcher，避免跨线程移动句柄"
    - "icon 生成：Python struct+zlib 生成 PNG → tauri icon 命令生成全套（icns/ico/png）"
